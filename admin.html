<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Utrecht Roleplay | Store Beheer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/store.css">
</head>
<body>
<div class="bg-overlay"></div>

<header class="topbar">
    <div class="brand">
        <img src="assets/images/logo.png" class="logo" alt="Utrecht Roleplay">
        <span>Store Beheer</span>
    </div>
    <nav class="nav">
        <a href="index.html">← Store</a>
        <a href="https://www.utrechtroleplay.eu/" target="_blank" rel="noopener">Website</a>
    </nav>
    <div class="nav-buttons">
        <button type="button" class="btn-outline" id="btnLogin">Discord login</button>
    </div>
</header>

<div class="admin-wrap">
    <h1 style="margin-bottom:8px">Store beheer</h1>
    <p style="color:rgba(234,240,255,.6);margin-bottom:24px">Alleen Discord-rollen uit DISCORD_STORE_ADMIN_ROLES.</p>

    <div class="admin-tabs">
        <button type="button" data-tab="categories" class="active">Categorieën</button>
        <button type="button" data-tab="products">Producten</button>
        <button type="button" data-tab="coins">Coins</button>
        <button type="button" data-tab="orders">Orders</button>
    </div>

    <div id="panel-categories" class="admin-panel active">
        <form class="admin-form" id="formCategory">
            <input type="hidden" name="id" id="catId">
            <label>Naam <input name="name" id="catName" required></label>
            <label>Sorteer <input name="sort" id="catSort" type="number" value="0"></label>
            <button type="submit" class="btn-main">Categorie opslaan</button>
        </form>
        <table class="admin-table"><thead><tr><th>ID</th><th>Naam</th><th></th></tr></thead><tbody id="catTable"></tbody></table>
    </div>

    <div id="panel-products" class="admin-panel">
        <form class="admin-form" id="formProduct">
            <input type="hidden" name="id" id="prodId">
            <label>Naam <input name="name" id="prodName" required></label>
            <label>Categorie <select name="categoryId" id="prodCat" required></select></label>
            <label>Type
                <select name="type" id="prodType">
                    <option value="vehicle">vehicle (garage)</option>
                    <option value="item">item</option>
                    <option value="other">other</option>
                </select>
            </label>
            <label>Prijs (coins) <input name="price" id="prodPrice" type="number" min="0" required></label>
            <label>Beschrijving <textarea name="description" id="prodDesc" rows="3"></textarea></label>
            <label>Voertuig model (spawn) <input name="model" id="prodModel" placeholder="adder"></label>
            <label>Garage <input name="garage" id="prodGarage" placeholder="pillboxgarage"></label>
            <label><input type="checkbox" id="prodActive" checked> Actief</label>
            <button type="submit" class="btn-main">Product opslaan</button>
        </form>
        <table class="admin-table"><thead><tr><th>Naam</th><th>Prijs</th><th>Type</th><th></th></tr></thead><tbody id="prodTable"></tbody></table>
    </div>

    <div id="panel-coins" class="admin-panel">
        <form class="admin-form" id="formCoins">
            <label>Discord user ID <input name="discordId" id="coinDiscordId" required placeholder="123456789012345678"></label>
            <label>Coins instellen <input name="coins" id="coinAmount" type="number" min="0"></label>
            <button type="submit" class="btn-main">Coins opslaan</button>
            <button type="button" class="btn-outline" id="btnCoinAdd">+100 coins</button>
        </form>
        <table class="admin-table"><thead><tr><th>Gebruiker</th><th>Coins</th><th>License</th></tr></thead><tbody id="userTable"></tbody></table>
    </div>

    <div id="panel-orders" class="admin-panel">
        <table class="admin-table"><thead><tr><th>ID</th><th>Product</th><th>Status</th><th>License</th></tr></thead><tbody id="orderTable"></tbody></table>
    </div>
</div>

<div class="store-toast" id="toast"></div>

<script src="js/store-config.js"></script>
<script src="assets/js/store-auth.js"></script>
<script src="assets/js/store-admin.js"></script>
</body>
</html>
